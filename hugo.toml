baseURL = "https://pensieve.peraleslab.com/"
locale = 'en-us'
title   = "Digital Pensieve"
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "The Digital Pensieve is not merely a tool for recollection; it's a portal to the past and a window into the present. It is a place where memories can be examined and understood."
  author = "Erick"
  DateFormat = "January 2, 2006"
  defaultTheme = "light"
  disableThemeToggle = true
  disableSpecial1stPost = true
  ShowReadingTime = true
  ShowWordCount = false
  ShowBreadCrumbs = false
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = false
  ShowAllPagesInArchive = false
  ShowToc = false
  hideFooter = false
  hideAuthor = true
  mainSections = ["posts"]

  [params.label]
    text = "Digital Pensieve"
    iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>'

  [params.footer]
    text = "The Digital Pensieve is not merely a tool for recollection; it's a portal to the past and a window into the present. It is a place where memories can be examined and understood."

