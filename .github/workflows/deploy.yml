name: Deploy blog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  S3_BUCKET: pensieve.peraleslab.com
  CLOUDFRONT_DISTRIBUTION_ID: DIST_ID
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with theme submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      -  name: Debug OIDC claims
         uses: actions/github-script@v7
         with:
            script: |
              const token = await core.getIDToken('sts.amazonaws.com');
              const claims = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
              console.log(JSON.stringify({ iss: claims.iss, aud: claims.aud, sub: claims.sub, exp: claims.exp, iat: claims.iat }, null, 2));

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::ACCOUNT_ID:role/github-actions-blog-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync ./public s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"